<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <rect width="1024" height="1024" fill="#2196F3"/>
    <!-- 外側の円（細い枠） -->
    <circle cx="512" cy="512" r="380" fill="none" stroke="#FFFFFF" stroke-width="48"/>

    <!-- 12時間の目盛り（シンプルな短い線） -->
    <g stroke="#FFFFFF" stroke-width="24" stroke-linecap="round">
        <!-- 12時 --> <line x1="512" y1="152" x2="512" y2="192"/>
        <!-- 1時 --> <line x1="672" y1="235" x2="692" y2="200"/>
        <!-- 2時 --> <line x1="789" y1="352" x2="824" y2="332"/>
        <!-- 3時 --> <line x1="832" y1="512" x2="872" y2="512"/>
        <!-- 4時 --> <line x1="789" y1="672" x2="824" y2="692"/>
        <!-- 5時 --> <line x1="672" y1="789" x2="692" y2="824"/>
        <!-- 6時 --> <line x1="512" y1="872" x2="512" y2="832"/>
        <!-- 7時 --> <line x1="352" y1="789" x2="332" y2="824"/>
        <!-- 8時 --> <line x1="235" y1="672" x2="200" y2="692"/>
        <!-- 9時 --> <line x1="192" y1="512" x2="152" y2="512"/>
        <!-- 10時 --> <line x1="235" y1="352" x2="200" y2="332"/>
        <!-- 11時 --> <line x1="352" y1="235" x2="332" y2="200"/>
    </g>

    <!-- 時針（10時を指す：短針） -->
    <line x1="512" y1="512" x2="512" y2="332"
          stroke="#FFFFFF" stroke-width="48" stroke-linecap="round"
          transform="rotate(-55 512 512)"/>

    <!-- 分針（10分を指す：長針） -->
    <line x1="512" y1="512" x2="512" y2="252"
          stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"
          transform="rotate(60 512 512)"/>

    <!-- 中心の小さな円 -->
    <circle cx="512" cy="512" r="56" fill="#FFFFFF"/>
</svg>