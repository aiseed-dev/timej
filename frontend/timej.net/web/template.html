<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{description}">
    <title>{title}</title>
    <link rel="icon" href="{root}favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="{root}style.css?v=1.0.0" />
    <meta property="og:title" content="{title}">
    <meta property="og:description" content="{description}">
    <meta property="og:image" content="https://timej.net/og-image.jpg">
    <meta property="og:url" content="https://timej.net/{path}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9FLQ963JXM"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-9FLQ963JXM');
    </script>
</head>

<body>

    <!-- ヘッダー -->
    <header>
        <div class="container">
            <div class="header-content">
                <a class="logo" href="{root}">
                    <img src="{root}app_icon.svg" alt="timej.netアイコン" class="logo-icon">
                    timej.net
                </a>
                <button class="hamburger" aria-label="メニュー">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <nav class="main-nav">
                    <a href="{root}#projects">アプリ</a>
                    <a href="{root}cookbook/">AI×Flutter</a>
                    <a href="{root}migration/">IT移行</a>
                    <a href="{root}packages/">パッケージ</a>
                    <a href="{root}dyslexia/">ディスレクシア</a>
                    <a href="{root}#about">About</a>
                </nav>
            </div>
        </div>
    </header>

{content}

    <!-- フッター -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="footer-logo">timej.net</span>
                    <p>アプリと開発レシピ</p>
                </div>
                <div class="footer-links">
                    <a href="{root}#projects">アプリ</a>
                    <a href="{root}cookbook/">AI×Flutter</a>
                    <a href="{root}migration/">IT移行</a>
                    <a href="{root}packages/">パッケージ</a>
                    <a href="{root}dyslexia/">ディスレクシア</a>
                    <a href="{root}#about">About</a>
                    <a href="{root}privacy/">プライバシーポリシー</a>
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLScf1__3fN4du4SqSRI9HF69W3YvZRFnYyB9WXO0ack_4hmsRw/viewform?usp=dialog"
                        target="_blank" rel="noopener noreferrer">お問い合わせ</a>
                </div>
            </div>
            <div class="copyright">
                © 2025 timej.net. All rights reserved.
            </div>
        </div>
    </footer>

    <script>
        // ハンバーガーメニューの制御
        const hamburger = document.querySelector('.hamburger');
        const mainNav = document.querySelector('.main-nav');
        const body = document.body;

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mainNav.classList.toggle('active');
            body.classList.toggle('menu-open');
        });

        // メニューリンククリック時にメニューを閉じる
        const navLinks = mainNav.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                mainNav.classList.remove('active');
                body.classList.remove('menu-open');
            });
        });

        // オーバーレイクリック時にメニューを閉じる
        document.addEventListener('click', (e) => {
            if (body.classList.contains('menu-open') &&
                !mainNav.contains(e.target) &&
                !hamburger.contains(e.target)) {
                hamburger.classList.remove('active');
                mainNav.classList.remove('active');
                body.classList.remove('menu-open');
            }
        });
    </script>

</body>

</html>
