<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Cyber Earth Artifact</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9FLQ963JXM"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-9FLQ963JXM');
    </script>
</head>

<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls;
        let earthMesh, atmosphereMesh, particles;
        let lights = [];

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205); // 漆黒に近い宇宙
            scene.fog = new THREE.FogExp2(0x020205, 0.02);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 15);

            // 3. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            // 4. Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5; // ゆっくり回す

            // --- Objects ---

            // A. Earth Sphere (地球本体)
            // テクスチャローダー
            const textureLoader = new THREE.TextureLoader();

            const earthGeo = new THREE.SphereGeometry(3.5, 64, 64);
            const earthMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 0.5,
                metalness: 0.1,
                // 夜の地球テクスチャ（CDNから読み込み）
                map: textureLoader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg'),
                emissive: 0x112244, // ほんのり青く発光させる
                emissiveIntensity: 0.2
            });
            earthMesh = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earthMesh);

            // B. Atmosphere/Shield (外側のワイヤーフレーム)
            // 少し大きくして、シールドっぽく回転させる
            const atmoGeo = new THREE.SphereGeometry(4.2, 32, 32);
            const atmoMat = new THREE.MeshBasicMaterial({
                color: 0x00ffff, // シアン色
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            atmosphereMesh = new THREE.Mesh(atmoGeo, atmoMat);
            scene.add(atmosphereMesh);

            // C. Stars (背景の星屑)
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 1500;
            const posArray = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 80;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particleMat = new THREE.PointsMaterial({
                size: 0.1,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });
            particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);

            // --- Lighting ---

            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            // 太陽光のような強い光（左上から）
            const sunLight = new THREE.DirectionalLight(0xffffff, 2);
            sunLight.position.set(-10, 10, 10);
            scene.add(sunLight);

            // アクセントになる動くライト（青）
            const blueLight = new THREE.PointLight(0x0088ff, 200, 50);
            scene.add(blueLight);
            lights.push(blueLight);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const time = performance.now() * 0.001;

            // 地球の自転
            earthMesh.rotation.y = time * 0.05;

            // 大気（ワイヤーフレーム）は逆回転させてSF感を出す
            atmosphereMesh.rotation.y = time * -0.1;
            atmosphereMesh.rotation.x = Math.sin(time * 0.2) * 0.1;

            // 背景の星をゆっくり動かす
            particles.rotation.y = time * 0.02;

            // ライトの周回アニメーション
            lights[0].position.x = Math.cos(time) * 10;
            lights[0].position.z = Math.sin(time) * 10;
            lights[0].position.y = Math.sin(time * 0.5) * 5;

            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
